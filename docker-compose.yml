version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: courtio-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: courtio

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courtio-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      MONGODB_URI: mongodb://mongo:27017/courtio
      PORT: 3001
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courtio-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_API_URL: http://backend:3001/api
    depends_on:
      - backend

volumes:
  mongo_data:
